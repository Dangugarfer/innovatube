version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innovatube-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - innovatube-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innovatube-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - innovatube-net

networks:
  innovatube-net:
    driver: bridge
